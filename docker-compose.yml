services:
  axiom-bot:
    build: .
    container_name: axiom-bot
    env_file: .env  # Load environment variables from .env file
    volumes:
      - ./config.py:/app/config.py  # Mount config for easy editing
    restart: unless-stopped
    healthcheck:
      # Heartbeat file must be updated within last 5 min (bot writes it on every event)
      test: ["CMD-SHELL", "python3 -c \"import os,time,sys; f='/tmp/axiom_heartbeat'; sys.exit(0 if os.path.exists(f) and time.time()-float(open(f).read())<300 else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s