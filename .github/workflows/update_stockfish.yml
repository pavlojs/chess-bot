name: Update Stockfish

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual trigger

jobs:
  update-stockfish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get latest Stockfish release
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/official-stockfish/Stockfish/releases/latest | jq -r '.tag_name')
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Check if update needed
        run: |
          if [ -f last_version.txt ] && [ "$(cat last_version.txt)" = "$LATEST_TAG" ]; then
            echo "Stockfish is already up to date ($LATEST_TAG)"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "New Stockfish version available: $LATEST_TAG"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
            echo "$LATEST_TAG" > last_version.txt
          fi

      # Downloading and storing large Stockfish binary files in git is no longer done
      # The Dockerfile will download and extract Stockfish during build time based on last_version.txt

      - name: Commit and push changes
        if: env.UPDATE_NEEDED == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_version.txt
          git commit -m "Update Stockfish version to $LATEST_TAG"
          git push origin main